name: Build Android arm64 (Operit)

# 用于在 GitHub Actions 上自行编译 Android arm64 版本的 new-api 二进制，
# 部署到 Operit 内置 Ubuntu chroot 环境运行。
# 产物上传为 workflow artifact，可从 Actions 运行页面下载。

on:
  # 手动触发：在 Actions 页面点 "Run workflow"
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（留空则用 git describe --tags）'
        required: false
        default: ''
  # 打 tag 时自动触发
  push:
    tags:
      - '*'
      - '!*-alpha*'

jobs:
  build-android-arm64:
    name: Build Android arm64
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Version
        id: ver
        run: |
          INPUT_VERSION="${{ github.event.inputs.version }}"
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
          else
            VERSION=$(git describe --tags 2>/dev/null || echo "dev-$(git rev-parse --short HEAD)")
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Resolved version: $VERSION"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build Frontend (default)
        env:
          CI: ""
        run: |
          cd web
          bun install --frozen-lockfile
          cd default
          DISABLE_ESLINT_PLUGIN='true' VITE_REACT_APP_VERSION=$VERSION bun run build
          cd ../..

      - name: Build Frontend (classic)
        env:
          CI: ""
        run: |
          cd web
          # classic 用独立的 filter 安装，避免重复安装
          bun install --filter ./classic --frozen-lockfile
          cd classic
          VITE_REACT_APP_VERSION=$VERSION bun run build
          cd ../..

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.25.1'

      - name: Build Backend (android arm64, CGO disabled)
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          go mod download
          # glebarez/sqlite 是纯 Go 实现，CGO_ENABLED=0 即可，无需交叉编译器
          go build -ldflags "-s -w -X 'github.com/QuantumNous/new-api/common.Version=$VERSION'" -o new-api-android-arm64

      - name: Strip & Verify
        run: |
          file new-api-android-arm64
          ls -lh new-api-android-arm64

      - name: Generate checksum
        run: sha256sum new-api-android-arm64 > new-api-android-arm64.sha256

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: new-api-android-arm64-${{ env.VERSION }}
          path: |
            new-api-android-arm64
            new-api-android-arm64.sha256
          retention-days: 30

      - name: Release (on tag push only)
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            new-api-android-arm64
            new-api-android-arm64.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
